about:
  intro: "I've been practicing yoga for nearly 30 years and teaching for almost two decades. Yoga changed my life in my 30s — not because I was naturally flexible or athletic (I wasn't), but because I discovered how much it could transform both my body and my mind. Through steady practice, I became stronger, more mobile, more focused — and more myself."
  body: "Now in my 50s, yoga and movement are what keep me active, stable, and energized. I love teaching more than ever. It brings me real joy to see how mindful movement helps people feel better — stronger, lighter, and more alive in their bodies.\n\nI've had the privilege to study with some of the world's most respected yoga teachers and have been deeply shaped by my years of regular meditation practice. You'll feel that in my sessions — whether we're working on strength, flexibility, breath, or simply finding more ease."
  fireflow_history: "Fireflow Yoga first opened in midtown Toronto in 2007. For nine years, it operated as a full-time studio, welcoming over 8,000 students from across the city. We hosted some of the most influential teachers in the yoga world — offering workshops and trainings with teachers like Matthew Sweeney and Darby.\n\nToday, Fireflow continues in a new form: a peaceful garden studio in downtown Toronto, offering private movement sessions for individuals and small groups. Whether you're brand new to movement or returning to it with fresh intentions, Fireflow is a place to reconnect with your body, your breath, and yourself."
  photo: "/images/jonathan.jpg"
  stats:
    years_teaching: 20
    years_practice: 30
    students: "8,000+"

film:
  title: "Sit. Walk. Listen. Repeat."
  description: "Jonathan spent seven years making a documentary about what happens when you sit in silence for seven days. The film follows a group of meditators through a silent retreat — the restlessness, the racing thoughts, and then, around day four, something nobody expected."
  video_url: "https://www.youtube.com/embed/YOUR_FILM_TRAILER_ID"
  festivals:
    - "Spirit Film Festival, Tel Aviv"
    - "Miami Jewish Film Festival"
  link_url: "https://whenthemindsettles.netlify.app"
  link_text: "Learn more about the film"

lolitta:
  description: "More than a decade ago, I made this short film about my Aunt Lolitta doing yoga at 95. It went viral — because it shows a simple, profound truth: movement is what keeps us alive."
  video_url: "https://www.youtube.com/embed/YOUR_LOLITTA_VIDEO_ID"
  caption: "Her practice wasn't fancy, but it was real — she moved with clarity, breath, and grace. This is what yoga is for."

