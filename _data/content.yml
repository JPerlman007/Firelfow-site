sessions:
  - title: "Private Reformer Pilates"
    icon: "reformer"
    description: "Spring resistance meets precise instruction. Target deep core and stabilizing muscles your other training misses. Low-impact, surprisingly challenging, and genuinely fun."
    detail: "45 min · Private sessions"
  - title: "Personal Yoga Training"
    icon: "yoga"
    description: "The perfect complement to strength training, running, or any sport. Every pose set up so you feel exactly how it works — building mobility, balance, and body awareness from the inside out. Couples train together but get individual attention. Different bodies, different needs, same session."
    detail: "60 min · Couples & semi-privates welcome"
  - title: "Yoga + Meditation"
    icon: "meditation"
    description: "Movement followed by guided stillness. A session that strengthens your body and quiets your mind — grounded in the body, quiet in the mind."
    detail: "75 min · Drawing on nearly a decade of retreat practice"

experience:
  - bold: "You'll feel muscles you've never felt."
    text: "Slow, precise work means every pose actually lands. Most people are surprised by how much they feel from movements that look simple. If triangle pose feels too easy, likely you're not sure how to fully engage more of your core. It's not that difficult but it's not intuitive."
  - bold: "You'll leave energized and relaxed at the same time."
    text: "That specific combination — strong but calm, worked but not wrecked — keeps people coming back."
  - bold: "It's built around your body."
    text: "Chronic back pain, stiff hips, post-surgery rehab, or just feeling disconnected. Every session adapts to where you are today."
  - bold: "Couples get individual attention — together."
    text: "Partners often have completely different needs. One might be working on a stiff lower back, the other on hip mobility. You share the session but the instruction is tailored to each of you."
  - bold: "The missing piece in your fitness routine."
    text: "If you already work with a trainer, run, cycle, or play tennis, this is the mobility, balance, and recovery work that keeps you moving safely and performing better."
  - bold: "No judgment, no performance."
    text: "It's just you (or you and a partner) in a quiet garden studio or in your home. The pace is yours."

