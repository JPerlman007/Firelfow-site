    name: "Monica"
    detail: "Reformer client"
  - quote: "We look forward to our weekly sessions. After each session we are always grateful for how we feel. Jonathan is a dedicated and knowledgeable teacher, full of passion and dedication."
    name: "Private yoga clients"
